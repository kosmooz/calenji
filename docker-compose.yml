name: socialapp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: socialapp
      POSTGRES_PASSWORD: socialapp_secret
      POSTGRES_DB: socialapp
    volumes:
      - socialapp-pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://socialapp:socialapp_secret@postgres:5432/socialapp
      JWT_ACCESS_SECRET: socialapp-jwt-secret-change-in-production-min-32-chars
      NODE_ENV: production
    volumes:
      - socialapp-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3003:3001"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "3004:3000"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  socialapp-pgdata:
  socialapp-uploads:
